<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zec IPTV Pro | Vercel</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root { --accent: #ff0055; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #05050b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Glassmorphism Sidebar */
        #sidebar { width: 320px; background: var(--glass); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; transition: 0.3s; }
        .header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #search { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        /* Channel List */
        #channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.2s; border: 1px solid transparent; }
        .channel-item:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .active { background: var(--accent) !important; font-weight: bold; box-shadow: 0 4px 15px rgba(255,0,85,0.3); }

        /* Player Area */
        #main { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #loading-overlay { position: absolute; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2 style="margin:0 0 10px 0; font-size: 18px; color: var(--accent);">ZEC IPTV PRO</h2>
        <input type="text" id="search" placeholder="Kanal ara..." oninput="renderChannels()">
    </div>
    <div id="channel-list">Yükleniyor...</div>
</div>

<div id="main">
    <div id="loading-overlay">Bağlanıyor...</div>
    <video id="video" controls autoplay playsinline></video>
</div>

<script>
    const M3U_URL = "http://puhtvhd.shop:8080/get.php?username=sinansert120&password=ymZWf3GIGE&type=m3u_plus&output=m3u8";
    let channels = [];
    let hls = null;
    const video = document.getElementById('video');
    const overlay = document.getElementById('loading-overlay');

    // 1. M3U Listesini Çek ve Ayıkla
    async function init() {
        try {
            // Liste çekimini de kendi Vercel proxy'miz üzerinden yapıyoruz (CORS hatasını önlemek için)
            const res = await fetch(`/api/proxy?url=${encodeURIComponent(M3U_URL)}`);
            const text = await res.text();
            parseM3U(text);
        } catch (e) {
            document.getElementById('channel-list').innerHTML = "Liste yükleme hatası!";
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes("#EXTINF:")) {
                const name = lines[i].split(',').pop().trim();
                const url = lines[i + 1]?.trim();
                // Sadece TR kanallarını filtreleyelim (İsteğe bağlı)
                if (url && (name.includes("TR") || lines[i].includes("SINEMA"))) {
                    channels.push({ name, url });
                }
            }
        }
        renderChannels();
    }

    function renderChannels() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
        document.getElementById('channel-list').innerHTML = filtered.map(c => 
            `<div class="channel-item" onclick="playStream(this, '${c.url}')">${c.name}</div>`
        ).join('');
    }

    function playStream(el, streamUrl) {
        // Aktif sınıfını güncelle
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        overlay.style.display = "block";

        // Vercel Proxy URL oluştur
        const finalUrl = `/api/proxy?url=${encodeURIComponent(streamUrl)}`;

        if (hls) { hls.destroy(); }

        if (Hls.isSupported()) {
            hls = new Hls({
                xhrSetup: function(xhr) { xhr.withCredentials = false; }
            });
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                overlay.style.display = "none";
            });
            hls.on(Hls.Events.ERROR, () => { overlay.innerText = "Yayın hatası!"; });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // iOS Native Oynatıcı
            video.src = finalUrl;
            video.play();
            overlay.style.display = "none";
        }
    }

    init();
</script>

</body>
</html>
