<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZEC IPTV PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="liste.js"></script>
    
    <style>
        :root { --accent: #ff0055; --bg: #05050b; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Glassmorphism Sidebar */
        #sidebar { 
            width: 320px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border-right: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; 
        }

        .header { padding: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        h2 { margin: 0 0 15px 0; font-size: 20px; letter-spacing: 2px; color: var(--accent); text-align: center; }
        
        #search { 
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; outline: none; transition: 0.3s;
        }
        #search:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }

        /* Kanal Listesi */
        #channel-list { flex: 1; overflow-y: auto; padding: 15px; }
        .channel-item { 
            padding: 14px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.02); 
            border-radius: 12px; cursor: pointer; font-size: 14px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .channel-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateX(5px); border-color: var(--accent); }
        .active { background: var(--accent) !important; font-weight: bold; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); border: none; }

        /* Video Alanı */
        #main { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #status { 
            position: absolute; z-index: 10; background: rgba(0,0,0,0.7); 
            padding: 10px 20px; border-radius: 30px; font-size: 13px; border: 1px solid var(--accent); display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2>ZEC IPTV PRO</h2>
        <input type="text" id="search" placeholder="Kanal ara..." oninput="filterChannels()">
    </div>
    <div id="channel-list">Liste yükleniyor...</div>
</div>

<div id="main">
    <div id="status">Kanal yükleniyor...</div>
    <video id="video" controls autoplay playsinline muted></video>
</div>

<script>
    let hlsPlayer = null;
    const videoElem = document.getElementById('video');
    const statusElem = document.getElementById('status');
    let allChannels = [];

    // 1. Kanal Listesini İşle
    function init() {
        if (typeof rawM3U === 'undefined') {
            document.getElementById('channel-list').innerText = "liste.js bulunamadı!";
            return;
        }
        
        const lines = rawM3U.split('\n');
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes("#EXTINF:")) {
                const name = lines[i].split(',').pop().trim();
                const url = lines[i + 1]?.trim();
                if (url && url.startsWith('http')) {
                    allChannels.push({ name, url });
                }
            }
        }
        filterChannels();
    }

    // 2. Arama ve Filtreleme
    function filterChannels() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = allChannels.filter(c => c.name.toLowerCase().includes(query));
        
        const container = document.getElementById('channel-list');
        container.innerHTML = filtered.map(c => 
            `<div class="channel-item" onclick="playChannel(this, '${c.url}')">${c.name}</div>`
        ).join('');
    }

    // 3. Güvenli Oynatma (HTTPS Tüneli)
    function playChannel(element, streamUrl) {
        // Arayüz güncelle
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        statusElem.style.display = "block";
        statusElem.innerText = "Yükleniyor...";

        // HTTPS ENGELİNİ AŞAN BÜYÜLÜ SATIR
        const secureUrl = `https://corsproxy.io/?${encodeURIComponent(streamUrl)}`;

        if (hlsPlayer) {
            hlsPlayer.destroy();
        }

        if (Hls.isSupported()) {
            hlsPlayer = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 60
            });
            hlsPlayer.loadSource(secureUrl);
            hlsPlayer.attachMedia(videoElem);
            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                videoElem.play();
                statusElem.style.display = "none";
            });
            hlsPlayer.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) statusElem.innerText = "Yayın Hatası!";
            });
        } else {
            // iOS Safari için
            videoElem.src = secureUrl;
            videoElem.play();
        }
    }

    window.onload = init;
</script>
</body>
</html>
