<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zec IPTV Pro | Local Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body { margin: 0; background: #05050b; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-right: 1px solid #333; display: flex; flex-direction: column; }
        #channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 12px; margin-bottom: 5px; background: #111; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid #222; }
        .active { background: #ff0055 !important; border-color: #ff0055; }
        #main { flex: 1; background: #000; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:20px; border-bottom:1px solid #333;"><h3>ZEC IPTV</h3></div>
    <div id="channel-list">Yükleniyor...</div>
</div>
<div id="main"><video id="video" controls autoplay playsinline muted></video></div>

<script>
    // NOT: Listeyi çekmek için geçici bir proxy kullanıyoruz, ama YAYINLAR doğrudan senden gidecek.
    const M3U_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent("http://puhtvhd.shop:8080/get.php?username=sinansert120&password=ymZWf3GIGE&type=m3u_plus&output=m3u8");

    async function init() {
        const res = await fetch(M3U_URL);
        const text = await res.text();
        const lines = text.split('\n');
        const list = document.getElementById('channel-list');
        list.innerHTML = "";
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes("#EXTINF:")) {
                const name = lines[i].split(',').pop().trim();
                const url = lines[i + 1]?.trim();
                if (url && url.startsWith('http')) {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.innerText = name;
                    div.onclick = () => play(div, url);
                    list.appendChild(div);
                }
            }
        }
    }

    function play(el, url) {
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const video = document.getElementById('video');
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url); // PROXY YOK! Doğrudan link.
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
        }
    }
    init();
</script>
</body>
</html>
