<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zec IPTV Pro | Vercel</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root { --accent: #ff0055; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #05050b; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: var(--glass); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #search { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        #channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.2s; border: 1px solid transparent; }
        .channel-item:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .active { background: var(--accent) !important; font-weight: bold; box-shadow: 0 4px 15px rgba(255,0,85,0.3); }
        #main { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; display: none; z-index: 10; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2 style="margin:0 0 10px 0; font-size: 18px; color: var(--accent);">ZEC IPTV PRO</h2>
        <input type="text" id="search" placeholder="Kanal ara..." oninput="renderChannels()">
    </div>
    <div id="channel-list">Liste yükleniyor...</div>
</div>

<div id="main">
    <div id="overlay">Hazırlanıyor...</div>
    <video id="video" controls autoplay playsinline muted style="background: #000;"></video>
</div>

<script>
    // Global Değişkenler
    const M3U_URL = "http://puhtvhd.shop:8080/get.php?username=sinansert120&password=ymZWf3GIGE&type=m3u_plus&output=m3u8";
    let allChannels = [];
    let hlsPlayer = null;
    const videoElem = document.getElementById('video');
    const overlayElem = document.getElementById('overlay');

    // 1. BAŞLATICI (SAYFA AÇILDIĞINDA ÇALIŞIR)
    async function startApp() {
        try {
            console.log("Uygulama başlatılıyor...");
            const proxyUrl = `/api/proxy?url=${encodeURIComponent(M3U_URL)}`;
            const response = await fetch(proxyUrl);
            const data = await response.text();
            
            parseM3UContent(data);
        } catch (error) {
            console.error("Yükleme hatası:", error);
            document.getElementById('channel-list').innerHTML = "Bağlantı hatası! Vercel Proxy'nizi kontrol edin.";
        }
    }

    // 2. M3U PARSE (AYRIŞTIRMA)
    function parseM3UContent(content) {
        const lines = content.split('\n');
        allChannels = [];
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes("#EXTINF:")) {
                const name = lines[i].split(',').pop().trim();
                const url = lines[i + 1]?.trim();
                if (url && url.startsWith('http')) {
                    allChannels.push({ name, url });
                }
            }
        }
        renderChannels();
    }

    // 3. LİSTEYİ EKRANA BASMA
    function renderChannels() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const filtered = allChannels.filter(c => c.name.toLowerCase().includes(searchTerm));
        
        const listContainer = document.getElementById('channel-list');
        if (filtered.length === 0) {
            listContainer.innerHTML = "Kanal bulunamadı.";
            return;
        }

        listContainer.innerHTML = filtered.map(c => 
            `<div class="channel-item" onclick="playSelectedStream(this, '${c.url}')">${c.name}</div>`
        ).join('');
    }

    // 4. OYNATMA (REVISED)
    async function playSelectedStream(element, streamUrl) {
        // Aktif kanal seçimi
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        
        overlayElem.style.display = "block";
        overlayElem.innerText = "Kanal açılıyor...";

        const finalProxyUrl = `/api/proxy?url=${encodeURIComponent(streamUrl)}`;

        // Eski oynatıcıyı temizle
        if (hlsPlayer) {
            hlsPlayer.destroy();
            hlsPlayer = null;
        }
        videoElem.pause();
        videoElem.src = "";
        videoElem.load();

        if (Hls.isSupported()) {
            hlsPlayer = new Hls({
                enableWorker: true,
                maxBufferLength: 30
            });
            hlsPlayer.loadSource(finalProxyUrl);
            hlsPlayer.attachMedia(videoElem);
            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                videoElem.play().catch(() => console.log("Oynatma etkileşim bekliyor"));
                overlayElem.style.display = "none";
            });
            hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                if(data.fatal) overlayElem.innerText = "Yayın Hatası!";
            });
        } else if (videoElem.canPlayType('application/vnd.apple.mpegurl')) {
            videoElem.src = finalProxyUrl;
            videoElem.addEventListener('loadedmetadata', () => {
                videoElem.play();
                overlayElem.style.display = "none";
            });
        }
    }

    // Uygulamayı tetikle
    window.onload = startApp;

</script>
</body>
</html>
