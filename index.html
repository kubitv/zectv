<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zec IPTV | Ultra Local</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root { --accent: #ff0055; }
        body { margin: 0; background: #05050b; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-right: 1px solid #333; display: flex; flex-direction: column; }
        #channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 12px; margin-bottom: 5px; background: #111; border-radius: 8px; cursor: pointer; font-size: 13px; border: 1px solid #222; }
        .active { background: var(--accent) !important; border-color: var(--accent); }
        #main { flex: 1; background: #000; position: relative; }
        video { width: 100%; height: 100%; }
        #msg { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px; font-size: 11px; color: yellow; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:20px; border-bottom:1px solid #333;"><h3 style="color:var(--accent); margin:0;">ZEC IPTV</h3></div>
    <div id="channel-list">Liste yükleniyor...</div>
</div>
<div id="main">
    <div id="msg">Tarayıcıda "Güvenli Olmayan İçeriğe İzin Ver" ayarını açmayı unutmayın!</div>
    <video id="video" controls autoplay playsinline muted></video>
</div>

<script>
    // --- BURAYA İNDİRDİĞİN M3U DOSYASININ İÇERİĞİNİ YAPIŞTIR ---
    const rawM3U = `#EXTM3U
#EXTINF:-1 tvg-id="" tvg-name="TR/ Duyurular" tvg-logo="https://apkx.xyz/abc.png" group-title="TR/ MaximTV DUYURULAR",TR/ Duyurular
http://puhtvhd.shop:8080/live/sinansert120/ymZWf3GIGE/183792.m3u8
#EXTINF:-1 tvg-id="" tvg-name="|TR| beIN Sports 1 (TTNET ÖZEL)" tvg-logo="http://apkx.xyz/tv-tum-dunya-logolar/logolar/tv-tum-dunya-logolar/turkeyT/bein_sports_1.png" group-title="TR/ BEIN SPOR",|TR| beIN Sports 1 (TTNET ÖZEL)
http://puhtvhd.shop:8080/live/sinansert120/ymZWf3GIGE/334642.m3u8
#EXTINF:-1 tvg-id="24KitchenTurkey.tr" tvg-name="|TR| beIN Sports 1 SD [480p]" tvg-logo="http://apkx.xyz/tv-tum-dunya-logolar/logolar/tv-tum-dunya-logolar/turkeyT/bein_sports_1.png" group-title="TR/ BEIN SPOR",|TR| beIN Sports 1 SD [480p]
http://puhtvhd.shop:8080/live/sinansert120/ymZWf3GIGE/35762.m3u8
#EXTINF:-1 tvg-id="" tvg-name="|TR| beIN Sports 1 720p" tvg-logo="http://apkx.xyz/tv-tum-dunya-logolar/logolar/tv-tum-dunya-logolar/turkeyT/bein_sports_1.png" group-title="TR/ BEIN SPOR",|TR| beIN Sports 1 720p
http://puhtvhd.shop:8080/live/sinansert120/ymZWf3GIGE/351541.m3u8
#EXTINF:-1 tvg-id="24KitchenTurkey.tr" tvg-name="|TR| beIN Sports 1 HD [VIP]" tvg-logo="http://apkx.xyz/tv-tum-dunya-logolar/logolar/tv-tum-dunya-logolar/turkeyT/bein_sports_1.png" group-title="TR/ BEIN SPOR",|TR| beIN Sports 1 HD [VIP]
http://puhtvhd.shop:8080/live/sinansert120/ymZWf3GIGE/98925.m3u8
#EXTINF:-1 tvg-id="" tvg-name="|TR| beIN Sports 1 FHD" tvg-logo="http://apkx.xyz/tv-tum-dunya-logolar/logolar/tv-tum-dunya-logolar/turkeyT/bein_sports_1.png" group-title="TR/ BEIN SPOR",|TR| beIN Sports 1 FHD
http://puhtvhd.shop:8080/live/sinansert120/ymZWf3GIGE/126272.m3u8
`; 
    // NOT: Yukarıdaki tırnak içine listenin tamamını yapıştır.

    function init() {
        const lines = rawM3U.split('\n');
        const list = document.getElementById('channel-list');
        list.innerHTML = "";
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes("#EXTINF:")) {
                const name = lines[i].split(',').pop().trim();
                const url = lines[i + 1]?.trim();
                if (url && url.startsWith('http')) {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.innerText = name;
                    div.onclick = () => play(div, url);
                    list.appendChild(div);
                }
            }
        }
    }

    function play(el, url) {
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const video = document.getElementById('video');
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            hls.on(Hls.Events.ERROR, (e, d) => {
                if(d.fatal) document.getElementById('msg').innerText = "Hata: HTTP/HTTPS engeli olabilir!";
            });
        } else {
            video.src = url;
        }
    }
    init();
</script>
</body>
</html>
