<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ZEC IPTV PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="liste.js"></script>
    <style>
        body { margin:0; background:#05050b; color:white; font-family:sans-serif; display:flex; height:100vh; }
        #sidebar { width:300px; background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border-right:1px solid #333; display:flex; flex-direction:column; }
        #channel-list { flex:1; overflow-y:auto; padding:10px; }
        .channel-item { padding:12px; margin-bottom:5px; background:#111; border-radius:8px; cursor:pointer; font-size:13px; border:1px solid #222; }
        .active { background:#ff0055 !important; border-color:#ff0055; }
        #main { flex:1; background:#000; position:relative; }
        video { width:100%; height:100%; background:#000; }
        #status { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.8); padding:8px; border-radius:5px; display:none; color:yellow; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:20px; border-bottom:1px solid #333;"><h3>ZEC IPTV</h3></div>
    <div id="channel-list">Yükleniyor...</div>
</div>
<div id="main">
    <div id="status">Yükleniyor...</div>
    <video id="video" controls autoplay playsinline muted></video>
</div>

<script>
    let hls = null;
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    function init() {
        if (typeof rawM3U === 'undefined') {
            document.getElementById('channel-list').innerText = "HATA: liste.js dosyası okunamadı!";
            return;
        }
        const lines = rawM3U.split('\n');
        const list = document.getElementById('channel-list');
        list.innerHTML = "";
        
        lines.forEach((line, index) => {
            if (line.includes("#EXTINF:")) {
                const name = line.split(',').pop().trim();
                const url = lines[index + 1]?.trim();
                if (url && url.startsWith('http')) {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.innerText = name;
                    div.onclick = () => play(div, url);
                    list.appendChild(div);
                }
            }
        });
    }

    function play(el, url) {
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        status.style.display = "block";
        status.innerText = "Yükleniyor: " + el.innerText;

        if (hls) { hls.destroy(); }

        // ÖNEMLİ: Hls kütüphanesinin yüklü olup olmadığını kontrol et
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                status.style.display = "none";
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    status.innerText = "Yayın Hatası! (Kilit simgesinden izin verin)";
                    console.error("HLS Hatası:", data);
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // iPhone Safari desteği
            video.src = url;
            video.play();
        } else {
            status.innerText = "Tarayıcı bu yayını desteklemiyor!";
        }
    }

    // liste.js yüklendikten sonra çalışması için kısa bir bekleme
    setTimeout(init, 500);
</script>
</body>
</html>
